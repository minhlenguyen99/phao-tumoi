<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MINH</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial;
}

body{
    margin:0;
    background:#f4f4f4;
}

/* HEADER */

header{
    background:#1e40af;
    color:white;
    padding:20px;
    text-align:center;
    cursor:pointer;
    position:sticky;
    top:0;
}

header h1{
    margin:0;
    font-size:40px;
}

/* CONTAINER */

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* SEARCH */

#search{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

#suggestions{
    background:white;
    border-radius:10px;
    margin-top:5px;
    overflow:hidden;
}

.suggestion{
    padding:12px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}

.suggestion:hover{
    background:#eee;
}

/* UNIT CARD */

.unit{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    transition:.2s;
}

.unit:hover{
    transform:translateY(-3px);
}

.lesson{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#1e40af;
    color:white;
}

</style>
</head>

<body>

<header onclick="showHome()">
    <h1>MINH</h1>
</header>

<div class="container">

<input
type="text"
id="search"
placeholder="🔍 Tìm từ..."
onkeyup="suggest()">

<div id="suggestions"></div>

<div id="content"></div>

</div>

<script>

const data={

U2:{

"Lesson 1-2":[

{stt:1,en:"transport",type:"n.",vi:"phương tiện"},
{stt:2,en:"city",type:"n.",vi:"thành phố"},
{stt:3,en:"traffic",type:"n.",vi:"giao thông"},
{stt:4,en:"busy",type:"adj.",vi:"bận rộn"},
{stt:5,en:"road",type:"n.",vi:"đường"}

],

"Lesson 3-4":[

{stt:1,en:"tram",type:"n.",vi:"xe điện"},
{stt:2,en:"update",type:"v.",vi:"cập nhật"},
{stt:3,en:"metro",type:"n.",vi:"tàu điện"},
{stt:4,en:"bike lane",type:"n.",vi:"làn xe đạp"},
{stt:5,en:"public",type:"adj.",vi:"công cộng"}

]

}

};

function showHome(){

document.getElementById("content").innerHTML=`

<div class="unit"
onclick="showUnit('U2')">

<h2>UNIT 2</h2>

<p>
10 từ • 2 lessons
</p>

</div>

`;

document.getElementById("suggestions").innerHTML="";
}

function showUnit(unit){

let html=`<h2>${unit}</h2>`;

for(let lesson in data[unit]){

html+=`

<div class="lesson">

<h3>${lesson}</h3>

<table>

<tr>
<th>STT</th>
<th>Từ</th>
<th>Loại</th>
<th>Nghĩa</th>
</tr>

`;

data[unit][lesson].forEach(w=>{

html+=`

<tr>

<td>${w.stt}</td>

<td>${w.en}</td>

<td>${w.type}</td>

<td>${w.vi}</td>

</tr>

`;

});

html+=`

</table>

</div>

`;
}

document.getElementById("content").innerHTML=html;
}

function suggest(){

let text=
document
.getElementById("search")
.value
.toLowerCase();

let box=
document
.getElementById("suggestions");

box.innerHTML="";

if(text==="") return;

let words=[];

for(let u in data)
for(let l in data[u])
words=words.concat(data[u][l]);

words
.filter(w=>
w.en
.toLowerCase()
.includes(text))
.slice(0,10)
.forEach(w=>{

box.innerHTML+=`

<div
class="suggestion"
onclick="
searchWord('${w.en}')
">

${w.en}

</div>

`;

});
}

function searchWord(word){

let words=[];

for(let u in data)
for(let l in data[u])
words=words.concat(data[u][l]);

let w=
words.find(
x=>x.en===word
);

if(w){

document
.getElementById("content")
.innerHTML=

`

<h2>
Kết quả tìm kiếm
</h2>

<table>

<tr>
<th>STT</th>
<th>Từ</th>
<th>Loại</th>
<th>Nghĩa</th>
</tr>

<tr>

<td>${w.stt}</td>

<td>${w.en}</td>

<td>${w.type}</td>

<td>${w.vi}</td>

</tr>

</table>

`;

document
.getElementById(
"suggestions"
)
.innerHTML="";
}
}

showHome();

</script>

</body>
</html>
