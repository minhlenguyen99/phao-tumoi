<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINH</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#f5f5f5;
}

header{
    background:#1e40af;
    color:white;
    text-align:center;
    padding:20px;
    cursor:pointer;
    position:sticky;
    top:0;
}

header h1{
    margin:0;
    font-size:40px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

#search{
    width:100%;
    padding:15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:10px;
}

#suggestions{
    background:white;
    border-radius:10px;
    margin-top:5px;
    overflow:hidden;
}

.suggestion{
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}

.suggestion:hover{
    background:#eee;
}

.word{
    padding:12px 0;
    border-bottom:1px solid #ddd;
    font-size:20px;
}
</style>
</head>

<body>

<header onclick="showHome()">
    <h1>MINH</h1>
</header>

<div class="container">

<input
type="text"
id="search"
placeholder="🔍 Tìm từ..."
onkeyup="suggest()">

<div id="suggestions"></div>

<div id="content"></div>

</div>

<script>

const words=[

{
stt:1,
en:"transport",
type:"n.",
vi:"phương tiện"
},

{
stt:2,
en:"city",
type:"n.",
vi:"thành phố"
},

{
stt:3,
en:"traffic",
type:"n.",
vi:"giao thông"
},

{
stt:4,
en:"busy",
type:"adj.",
vi:"bận rộn"
},

{
stt:5,
en:"road",
type:"n.",
vi:"đường"
},

{
stt:6,
en:"tram",
type:"n.",
vi:"xe điện"
},

{
stt:7,
en:"update",
type:"v.",
vi:"cập nhật"
},

{
stt:8,
en:"metro",
type:"n.",
vi:"tàu điện"
},

{
stt:9,
en:"bike lane",
type:"n.",
vi:"làn xe đạp"
},

{
stt:10,
en:"public",
type:"adj.",
vi:"công cộng"
}

];

function showHome(){

let html="";

words.forEach(w=>{

html += `

<div class="word">

${w.stt}. ${w.en} (${w.type}): ${w.vi}

</div>

`;

});

document.getElementById("content").innerHTML=html;
document.getElementById("suggestions").innerHTML="";
}

function suggest(){

let text=
document
.getElementById("search")
.value
.toLowerCase();

let box=
document
.getElementById("suggestions");

box.innerHTML="";

if(text===""){
    showHome();
    return;
}

words
.filter(w=>
w.en
.toLowerCase()
.includes(text))
.slice(0,10)
.forEach(w=>{

box.innerHTML += `

<div
class="suggestion"
onclick="searchWord('${w.en}')">

${w.en}

</div>

`;

});

}

function searchWord(word){

let w=
words.find(
x=>x.en===word
);

if(w){

document
.getElementById("content")
.innerHTML =

`

<div class="word">

${w.stt}. ${w.en} (${w.type}): ${w.vi}

</div>

`;

document
.getElementById("suggestions")
.innerHTML="";

}

}

showHome();

</script>

</body>
</html>
