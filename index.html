<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.word{
    font-size:22px;
    padding:12px 0;
    border-bottom:1px solid #ddd;
    line-height:1.6;
}

.word:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<div class="container" id="content"></div>

<script>

const words = [

{
stt:1,
en:"transport",
type:"n.",
vi:"phương tiện"
},

{
stt:2,
en:"city",
type:"n.",
vi:"thành phố"
},

{
stt:3,
en:"traffic",
type:"n.",
vi:"giao thông"
},

{
stt:4,
en:"busy",
type:"adj.",
vi:"bận rộn"
},

{
stt:5,
en:"road",
type:"n.",
vi:"đường"
},

{
stt:6,
en:"tram",
type:"n.",
vi:"xe điện"
},

{
stt:7,
en:"update",
type:"v.",
vi:"cập nhật"
},

{
stt:8,
en:"metro",
type:"n.",
vi:"tàu điện"
},

{
stt:9,
en:"bike lane",
type:"n.",
vi:"làn xe đạp"
},

{
stt:10,
en:"public",
type:"adj.",
vi:"công cộng"
}

];

let html = "";

words.forEach(w => {

html += `
<div class="word">
${w.stt}. ${w.en} (${w.type}): ${w.vi}
</div>
`;

});

document.getElementById("content").innerHTML = html;

</script>

</body>
</html>
